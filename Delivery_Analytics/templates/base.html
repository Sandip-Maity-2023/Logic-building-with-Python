<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Restaurant Analytics{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="topbar">
    <a class="brand" href="{{ url_for('home') }}">Restaurant Analytics</a>
    <div class="navlinks">
        {% if active_dataset %}
            <a href="{{ url_for('dashboard', filename=active_dataset) }}">Dashboard</a>
            <a href="{{ url_for('search', filename=active_dataset) }}">Search</a>
            <a href="{{ url_for('recommend', filename=active_dataset) }}">Recommend</a>
            <a href="{{ url_for('sentiment', filename=active_dataset) }}">Sentiment</a>
            <a href="{{ url_for('predict', filename=active_dataset) }}">Predict</a>
        {% endif %}
        <a href="{{ url_for('upload_file') }}">Upload</a>
    </div>
</nav>

<main class="shell">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
