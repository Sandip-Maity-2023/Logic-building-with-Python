{% extends "base.html" %}
{% block title %}Upload | Restaurant Analytics{% endblock %}

{% block content %}
<section class="page-head">
    <div>
        <p class="eyebrow">CSV input</p>
        <h1>Upload and Analyze Dataset</h1>
    </div>
</section>

<section class="panel upload-panel">
    <form method="post" enctype="multipart/form-data">
        <input class="form-control form-control-lg" type="file" name="file" accept=".csv" required>
        <button class="btn btn-primary btn-lg" type="submit">Upload Dataset</button>
    </form>
</section>

{% if datasets %}
<section class="panel">
    <div class="section-title"><h2>Available Datasets</h2></div>
    <div class="dataset-list">
        {% for dataset in datasets %}
            <a href="{{ url_for('dashboard', filename=dataset) }}">{{ dataset }}</a>
        {% endfor %}
    </div>
</section>
{% endif %}
{% endblock %}
